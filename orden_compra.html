<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Purchase - Orden de Compra</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-brand"><h2><a href="dashboard.html" style="color: #38bdf8; text-decoration: none;">Smart Purchase</a></h2></div>
            <nav class="sidebar-menu">
                <ul>
                    <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Inicio</a></li>
                    <li><a href="cotizacion.html"><i class="fa-solid fa-file-invoice-dollar"></i> Cotización</a></li>
                    <li><a href="facturacion.html"><i class="fa-solid fa-receipt"></i> Facturación</a></li>
                    <li><a href="orden_compra.html" class="active"><i class="fa-solid fa-file-contract"></i> Orden de Compra</a></li>
                    <li><a href="facturas_compra.html"><i class="fa-solid fa-file-invoice"></i> Facturas de Compras</a></li>
                    <li><a href="inventario.html"><i class="fa-solid fa-boxes-stacked"></i> Inventario</a></li>
                    <li><a href="tesoreria.html"><i class="fa-solid fa-scale-balanced"></i> Tesorería</a></li>
                    <li><a href="ajustes.html"><i class="fa-solid fa-sliders"></i> Ajustes</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="btn-logout" id="btn-cerrar-sesion"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="welcome-text">
                    <h1>Órdenes de Compra</h1>
                    <p>Genere solicitudes de abastecimiento formales para enviar a sus proveedores.</p>
                </div>
            </header>

            <div style="background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px;">
                <h3 style="margin-bottom: 15px; color: #1e293b;">Generar Orden de Suministro</h3>
                <form id="form-orden-compra">
                    <div class="input-group">
                        <label>Seleccionar Proveedor</label>
                        <select class="modal-select" required>
                            <option value="prov1">Proveedor Global de Papelería S.A.</option>
                            <option value="prov2">Tecnologías del Futuro Ltda.</option>
                            <option value="prov3">Logística Central de Insumos</option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <label>Ítem requerido / Descripción</label>
                            <input type="text" placeholder="Ej. Resmas de papel Carta" required>
                        </div>
                        <div class="input-group">
                            <label>Cantidad</label>
                            <input type="number" placeholder="1" min="1" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-save" style="background-color: #6366f1; color: white;">Enviar a Aprobación</button>
                </form>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
